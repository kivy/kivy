name: iOS wheels

on:
  push:
  pull_request:
  create:
  schedule:
    - cron:  '23 1 * * *'

env:
  KIVY_SPLIT_EXAMPLES: 1
  SERVER_IP: '159.203.106.198'

jobs:
  ios_wheels_create:
    name: Build iOS wheels
    if: github.event_name == 'schedule' || (github.event_name == 'create' && github.event.ref_type == 'tag') || contains(github.event.head_commit.message, '[build wheel]') || contains(github.event.head_commit.message, '[build wheel ios]') || contains(github.event.pull_request.title, '[build wheel]') || contains(github.event.pull_request.title, '[build wheel ios]')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install CI/CD Python requirements
        run: |
          python -m pip install -r .ci/cicd-requirements.txt
      - uses: actions/cache@v5
        id: cacheiosdeps
        with:
          path: ios-kivy-dependencies
          key: ios-deps-${{ runner.os }}-${{ hashFiles('tools/build_ios_dependencies.sh') }}
      - name: Build iOS dependencies
        if: steps.cacheiosdeps.outputs.cache-hit != 'true'
        run: |
          ./tools/build_ios_dependencies.sh
      - name: Build iOS wheels
        env:
            CIBW_PLATFORM: ios
            CIBW_ARCHS: "arm64_iphoneos arm64_iphonesimulator x86_64_iphonesimulator"
            KIVY_SPLIT_EXAMPLES: 1
        run: |
          export KIVY_DEPS_ROOT=$(pwd)/ios-kivy-dependencies
          python -m cibuildwheel --output-dir wheelhouse
      - name: Patch iOS wheels to include Kivy dependencies in .framework folder
        run: |
          export KIVY_DEPS_ROOT=$(pwd)/ios-kivy-dependencies
          python ./tools/add-ios-frameworks.py ./wheelhouse
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v6
        with:
          name: ios_wheels
          path: wheelhouse/*.whl

  ios_wheel_upload:
    runs-on: macos-15
    needs: ios_wheels_create
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: |
          python -m pip install -r .ci/cicd-requirements.txt
      - uses: actions/download-artifact@v7
        with:
          name: ios_wheels
          path: dist
      - name: Rename wheels
        if: github.event.ref_type != 'tag'
        run: |
          source .ci/ubuntu_ci.sh
          rename_wheels
      - name: Upload wheels to server
        env:
          UBUNTU_UPLOAD_KEY: ${{ secrets.UBUNTU_UPLOAD_KEY }}
        run: |
          source .ci/ubuntu_ci.sh
          upload_file_to_server "$SERVER_IP" "ios/kivy/"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          draft: true
      - name: Publish to PyPI
        if: github.event_name == 'create' && github.event.ref_type == 'tag'
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.pypi_password }}
        run: |
          twine upload dist/*
