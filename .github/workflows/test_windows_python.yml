name: Windows Unittests

on: [push, pull_request]

env:
  GST_REGISTRY: '~/registry.bin'
  KIVY_GL_BACKEND: 'angle_sdl3'
  KIVY_SPLIT_EXAMPLES: 1

jobs:
  unit_test:
    runs-on: windows-2025
    strategy:
      matrix:
        python: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']
        arch: ['x64']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python }} on ${{ matrix.arch }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python }}
        architecture: ${{ matrix.arch }}
    - name: Set up MSVC toolchain
      # Needed by ``tools/build_thorvg.sh`` (Meson probes cl.exe / link.exe)
      # and by setup.py's C++ extension compilation for kivy.lib.thorvg.
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}
    - name: Install build tooling for ThorVG
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade meson ninja
    - name: Build ThorVG (static, x64)
      shell: bash
      run: |
        bash tools/build_thorvg.sh
        # Propagate the shared dependencies root to subsequent steps so
        # setup.py's determine_thorvg_flags() picks up the static archive
        # and headers we just produced.
        echo "KIVY_DEPS_ROOT=$(pwd)/kivy-dependencies" >> "$GITHUB_ENV"
    - name: Install Kivy
      run: |
        . .\.ci\windows_ci.ps1
        Install-kivy
    - name: Test Kivy
      run: |
        . .\.ci\windows_ci.ps1
        Test-kivy
    - name: Test Kivy benchmarks
      run: |
        . .\.ci\windows_ci.ps1
        Test-kivy-benchmark
    - name: Upload benchmarks as artifact
      uses: actions/upload-artifact@v6
      with:
        name: benchmarks-windows-unittests-python-${{ matrix.python }}-${{ matrix.arch }}
        path: .benchmarks-kivy
