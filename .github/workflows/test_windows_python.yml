name: Windows Unittests

on: [push, pull_request]

env:
  GST_REGISTRY: '~/registry.bin'
  KIVY_GL_BACKEND: 'angle_sdl3'
  KIVY_SPLIT_EXAMPLES: 1

jobs:
  unit_test:
    runs-on: windows-2025
    strategy:
      matrix:
        python: ['3.11', '3.12', '3.13', '3.14']
        arch: ['x64']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python }} on ${{ matrix.arch }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python }}
        architecture: ${{ matrix.arch }}
    - name: Set up MSVC toolchain
      # Needed by ``tools/build_thorvg.sh`` (Meson probes cl.exe / link.exe)
      # and by setup.py's C++ extension compilation for kivy.lib.thorvg.
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}
    - name: Install build tooling for ThorVG
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade meson ninja
    - name: Build ThorVG (static, x64)
      shell: bash
      run: |
        bash tools/build_thorvg.sh
        # Expose ONLY the ThorVG include/lib paths to subsequent steps
        # (not ``KIVY_DEPS_ROOT``). On Windows, SDL3 comes from the
        # ``kivy_deps.sdl3`` pip package installed by ``[dev,full]``, not
        # from ``kivy-dependencies/``. ``determine_sdl3()`` in setup.py
        # keys off ``KIVY_DEPS_ROOT`` and, if set, uses ONLY that tree for
        # SDL3 discovery - skipping the pip-package fallback. Setting
        # ``KIVY_DEPS_ROOT`` here would therefore silently disable every
        # ``*_sdl3.pyx`` provider (window / text / clipboard / image /
        # audio / system_tray) and break the Kivy test suite.
        echo "KIVY_THORVG_INCLUDE_DIR=$(pwd)/kivy-dependencies/dist/include/thorvg-1" >> "$GITHUB_ENV"
        echo "KIVY_THORVG_LIB_DIR=$(pwd)/kivy-dependencies/dist/lib" >> "$GITHUB_ENV"
    - name: Install Kivy
      run: |
        . .\.ci\windows_ci.ps1
        Install-kivy
    - name: Test Kivy
      run: |
        . .\.ci\windows_ci.ps1
        Test-kivy
    - name: Test Kivy benchmarks
      run: |
        . .\.ci\windows_ci.ps1
        Test-kivy-benchmark
    - name: Upload benchmarks as artifact
      uses: actions/upload-artifact@v6
      with:
        name: benchmarks-windows-unittests-python-${{ matrix.python }}-${{ matrix.arch }}
        path: .benchmarks-kivy
