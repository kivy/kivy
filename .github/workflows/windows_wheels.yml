name: Windows wheels

on:
  push:
  pull_request:
  create:
  schedule:
    - cron:  '23 1 * * *'

env:
  KIVY_SPLIT_EXAMPLES: 1
  SERVER_IP: '159.203.106.198'
  GST_REGISTRY: '~/registry.bin'
  KIVY_GL_BACKEND: 'angle_sdl3'

jobs:
  windows_wheels_create:
    runs-on: windows-latest
    strategy:
      matrix:
        python: [ '3.9', '3.10', '3.11', '3.12', '3.13', '3.14' ]
        arch: ['x64']
    if: github.event_name == 'schedule' || (github.event_name == 'create' && github.event.ref_type == 'tag') || contains(github.event.head_commit.message, '[build wheel]') || contains(github.event.head_commit.message, '[build wheel win]') || contains(github.event.pull_request.title, '[build wheel]') || contains(github.event.pull_request.title, '[build wheel win]')
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python }}
        architecture: ${{ matrix.arch }}
    - name: Set up MSVC toolchain
      # Needed by tools/build_thorvg.sh (Meson probes cl.exe / link.exe)
      # and by setup.py's C++ extension compilation for kivy.lib.thorvg.
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.arch }}
    - name: Install build tooling for ThorVG
      run: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade meson ninja
    - name: Build ThorVG (static, x64)
      shell: bash
      run: |
        bash tools/build_thorvg.sh
        # Use dedicated KIVY_THORVG_* env vars (not KIVY_DEPS_ROOT). On
        # Windows SDL3 ships via the kivy_deps.sdl3 pip package pulled
        # in by [dev,full]; pointing KIVY_DEPS_ROOT at our ThorVG-only
        # tree would hijack determine_sdl3() and silently disable every
        # *_sdl3.pyx provider. See commit f846fe8b7 on this branch /
        # test_windows_python.yml for the cross-reference.
        echo "KIVY_THORVG_INCLUDE_DIR=$(pwd)/kivy-dependencies/dist/include/thorvg-1" >> "$GITHUB_ENV"
        echo "KIVY_THORVG_LIB_DIR=$(pwd)/kivy-dependencies/dist/lib" >> "$GITHUB_ENV"
    - name: Generate version metadata
      run: |
        . .\.ci\windows_ci.ps1
        Update-version-metadata
    - name: Generate sdist/kivy-examples
      if: matrix.arch == 'x64' && matrix.python == '3.9'
      # only windows kivy-examples is uploaded
      run: |
        . .\.ci\windows_ci.ps1
        Generate-sdist
    - name: Install Kivy
      run: |
        . .\.ci\windows_ci.ps1
        Install-kivy
    - name: Make wheels
      run: |
        . .\.ci\windows_ci.ps1
        Generate-windows-wheels
    - name: Upload wheels as artifact
      uses: actions/upload-artifact@v6
      with:
        name: windows_wheels-${{ matrix.python }}-${{ matrix.arch }}
        path: dist

  windows_wheel_upload:
    runs-on: windows-latest
    needs: windows_wheels_create
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - run: |
          python -m pip install -r .ci/cicd-requirements.txt
      - uses: actions/download-artifact@v7
        with:
          pattern: windows_wheels-*-*
          merge-multiple: true
          path: dist
      - name: Fix wheel names
        if: github.event.ref_type != 'tag'
        run: |
          . .\.ci\windows_ci.ps1
          Rename-windows-wheels
      - name: Install MSYS2
        run: choco install msys2
      - name: Upload wheels to server
        env:
          UBUNTU_UPLOAD_KEY: ${{ secrets.UBUNTU_UPLOAD_KEY }}
          MSYSTEM: MINGW64
          CHERE_INVOKING: 1
        run: |
          . .\.ci\windows_ci.ps1
          Upload-windows-wheels-to-server -ip "$env:SERVER_IP"
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
          draft: true
      - name: Publish to PyPI
        if: github.event_name == 'create' && github.event.ref_type == 'tag'
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.pypi_password }}
        run: |
          twine upload dist/*

  windows_wheel_test:
    runs-on: windows-latest
    needs: windows_wheels_create
    strategy:
      matrix:
        python: [ '3.9', '3.10', '3.11', '3.12', '3.13', '3.14' ]
        arch: [ 'x64' ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python }} on ${{ matrix.arch }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          architecture: ${{ matrix.arch }}
      - uses: actions/download-artifact@v7
        with:
          # Only one windows_wheels-*-* artifact contains the kivy-examples
          # However, all artifacts are downloaded ATM, to avoid using
          # a specific name.
          pattern: windows_wheels-*-*
          merge-multiple: true
          path: dist
      - name: Install Kivy Wheel
        run: |
          . .\.ci\windows_ci.ps1
          Install-kivy-wheel
      - name: Test Kivy Wheel
        run: |
          . .\.ci\windows_ci.ps1
          Test-kivy-installed
      - name: Test Kivy benchmarks
        run: |
          . .\.ci\windows_ci.ps1
          Test-kivy-benchmark
      - name: Upload benchmarks as artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmarks-windows-wheels-python-${{ matrix.python }}-${{ matrix.arch }}
          path: .benchmarks-kivy

  windows_sdist_test:
    runs-on: windows-latest
    needs: windows_wheels_create
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - uses: actions/download-artifact@v7
        with:
          # Only one windows_wheels-*-* artifact contains the sdist
          # However, all artifacts are downloaded ATM, to avoid using
          # a specific name.
          pattern: windows_wheels-*-*
          merge-multiple: true
          path: dist
      - name: Set up MSVC toolchain
        # Install-kivy-sdist pip-installs from the sdist tarball, which
        # rebuilds Kivy (and the kivy.lib.thorvg C++ extension) from
        # source. Needs the same MSVC + ThorVG prep as windows_wheels_create.
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install build tooling for ThorVG
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade meson ninja
      - name: Build ThorVG (static, x64)
        shell: bash
        run: |
          bash tools/build_thorvg.sh
          echo "KIVY_THORVG_INCLUDE_DIR=$(pwd)/kivy-dependencies/dist/include/thorvg-1" >> "$GITHUB_ENV"
          echo "KIVY_THORVG_LIB_DIR=$(pwd)/kivy-dependencies/dist/lib" >> "$GITHUB_ENV"
      - name: Install Kivy sdist
        env:
          KIVY_SPLIT_EXAMPLES: 0
        run: |
          . .\.ci\windows_ci.ps1
          Install-kivy-sdist
      - name: Test Kivy sdist
        run: |
          . .\.ci\windows_ci.ps1
          Test-kivy-installed

  always_job:
    name: Always run job
    runs-on: windows-latest
    steps:
      - name: Always run
        run: |
          echo "This is run to prevent the workflow from showing an error if the wheels job is not run and no jobs run is an error."
          echo "See https://github.community/t5/GitHub-Actions/Workflow-is-failing-if-no-job-can-be-ran-due-to-condition/m-p/38085"
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
